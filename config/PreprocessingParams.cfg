#!/usr/bin/env python
PACKAGE = "lidar_preprocessing_pipeline"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

deskew = gen.add_group("pointcloud_deskew", type="tab")
deskew.add("pointcloud_deskew_enabled", bool_t, 0, "Enable deskewing", True)
deskew.add("pointcloud_deskew_approximate_gravity", bool_t, 0, "Approximate gravity direction", True)

gravity_align = gen.add_group("gravity_align", type="tab")
gravity_align.add("gravity_align_enabled", bool_t, 0, "Enable gravity alignment", False)

voxel = gen.add_group("voxel_grid_filter", type="tab")
voxel.add("voxel_grid_filter_enabled", bool_t, 0, "Enable voxel grid downsampling", False)
voxel.add("voxel_grid_filter_leaf_size", double_t, 0, "Voxel leaf size (m)", 0.1, 0.01, 5.0)

ror = gen.add_group("radius_outlier_removal", type="tab")
ror.add("radius_outlier_removal_enabled", bool_t, 0, "Enable radius outlier removal", False)
ror.add("radius_outlier_removal_radius", double_t, 0, "Search radius (m)", 0.5, 0.0, 10.0)
ror.add("radius_outlier_removal_min_neighbors", int_t, 0, "Minimum neighbors", 5, 0, 200)

livox = gen.add_group("livox_tag_filter", type="tab")
livox.add("livox_tag_filter_enabled", bool_t, 0, "Enable Livox tag filtering", False)
livox.add("livox_tag_filter_remove_high_confidence_noise", bool_t, 0, "Remove high confidence spatial noise", False)
livox.add("livox_tag_filter_remove_moderate_confidence_noise", bool_t, 0, "Remove moderate confidence spatial noise", False)
livox.add("livox_tag_filter_remove_low_confidence_noise", bool_t, 0, "Remove low confidence spatial noise", False)
livox.add("livox_tag_filter_remove_intensity_noise", bool_t, 0, "Remove low-intensity noise", False)
livox.add("livox_tag_filter_output_per_return", bool_t, 0, "Output per-return clouds instead of combined", False)

exit(gen.generate(PACKAGE, "lidar_preprocessing_pipeline", "PreprocessingParams"))
